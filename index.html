<div class="calculator">
  <input type="text" id="display" readonly>
  <div class="buttons">
    <button data-action="clear" class="clear">C</button>
    <button data-action="delete">⌫</button>
    <button data-value="%">%</button>
    <button data-value="÷">÷</button>

    <button data-value="7">7</button>
    <button data-value="8">8</button>
    <button data-value="9">9</button>
    <button data-value="×">×</button>

    <button data-value="4">4</button>
    <button data-value="5">5</button>
    <button data-value="6">6</button>
    <button data-value="-">-</button>

    <button data-value="1">1</button>
    <button data-value="2">2</button>
    <button data-value="3">3</button>
    <button data-value="+">+</button>

    <button data-value="0">0</button>
    <button data-value=".">.</button>
    <button data-action="equal" class="equal">=</button>
     <button class="num" data-value=""<a href="https://www.instagram.com/brignover?igsh=MXY4MTU0bWM2Mmhvdg==" class="img-button">
  <img src="logo.png" alt="logo">
</a></button>
     
  </div>
</div>
<script type="text/javascript">
const display = document.getElementById('display');

let interval;
let raw = "";

// format ribuan
function formatNumber(num) {
  if (!num) return "";

  let parts = num.split(".");

  // format bagian depan (ribuan)
  parts[0] = parts[0]
    .replace(/^0+(?=\d)/, "") // hapus nol depan
    .replace(/\B(?=(\d{3})+(?!\d))/g, ".");

  return parts.join(".");
}

// tambah input
function append(value) {
  // cegah dua titik desimal
  if (value === "." && raw.includes(".")) return;

  raw += value;

  display.value = formatNumber(raw);
}

// clear semua
function clearDisplay() {
  raw = "";
  display.value = "";
}

// hapus 1 karakter
function deleteLast() {
  raw = raw.slice(0, -1);
  display.value = formatNumber(raw);
}

// hitung hasil
function calculate() {
  try {
    if (raw.trim() === '') {
      display.value = 'kosong';
      return;
    }

    let exp = raw;

    exp = exp.replace(/×/g, "*");
    exp = exp.replace(/÷/g, "/");

    // persen (contoh: 50%200 = 0.5 * 200)
    exp = exp.replace(/(\d+\.?\d*)%(\d+\.?\d*)/g, '($1/100)*$2');

    let result = eval(exp);

    raw = String(result);
    display.value = formatNumber(raw);

  } catch (e) {
    display.value = 'error';
  }
}

// tombol handler
function handleButton(btn) {
  const value = btn.dataset.value;
  const action = btn.dataset.action;

  if (value) append(value);
  if (action === 'delete') deleteLast();
  if (action === 'clear') clearDisplay();
  if (action === 'equal') calculate();
}

// hold tombol (auto spam delete dll)
function startHold(btn) {
  stopHold();

  handleButton(btn);

  let speed = btn.dataset.action === 'delete' ? 100 : 300;

  interval = setInterval(() => {
    handleButton(btn);
  }, speed);
}

function stopHold() {
  clearInterval(interval);
}

// event semua tombol
document.querySelectorAll("button").forEach((btn) => {
  btn.addEventListener("pointerdown", () => startHold(btn));

  btn.addEventListener("pointerup", stopHold);
  btn.addEventListener("pointerleave", stopHold);
  btn.addEventListener("pointercancel", stopHold);
});
</script>
